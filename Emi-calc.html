<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced EMI Calculator</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: var(--card);
            max-width: 800px;
            width: 100%;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        h2 { margin-top: 0; color: var(--primary); }

        .input-group { margin-bottom: 20px; }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="number"] {
            width: 80px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline-color: var(--primary);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .results-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .result-item:last-child { border: none; }

        .highlight {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .label { color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="inputs">
        <h2>Loan Details</h2>
        
        <div class="input-group">
            <div class="label-row">
                <span>Loan Amount (₹)</span>
                <input type="number" id="val_amount" value="500000">
            </div>
            <input type="range" id="sld_amount" min="10000" max="5000000" step="10000" value="500000">
        </div>

        <div class="input-group">
            <div class="label-row">
                <span>Interest Rate (% P.A.)</span>
                <input type="number" id="val_interest" value="10.5" step="0.1">
            </div>
            <input type="range" id="sld_interest" min="1" max="30" step="0.1" value="10.5">
        </div>

        <div class="input-group">
            <div class="label-row">
                <span>Tenure (Years)</span>
                <input type="number" id="val_tenure" value="5">
            </div>
            <input type="range" id="sld_tenure" min="1" max="30" step="1" value="5">
        </div>

        <div class="input-group">
            <div class="label-row">
                <span>Processing Fee (%)</span>
                <input type="number" id="val_pf_pct" value="2" step="0.1">
            </div>
            <input type="range" id="sld_pf_pct" min="0" max="5" step="0.1" value="2">
        </div>
    </div>

    <div class="results">
        <h2>Breakdown</h2>
        <div class="results-card">
            <div class="result-item">
                <span class="label">Monthly EMI</span>
                <span class="highlight" id="res_emi">₹ 0</span>
            </div>
            <div class="result-item">
                <span class="label">Monthly Interest Rate</span>
                <span id="res_monthly_rate">0%</span>
            </div>
            <div class="result-item">
                <span class="label">Total Months</span>
                <span id="res_total_months">0</span>
            </div>
            <div class="result-item">
                <span class="label">Processing Fee Amt</span>
                <span id="res_pf_amt">₹ 0</span>
            </div>
            <div class="result-item">
                <span class="label">Disbursement Amt</span>
                <span id="res_disbursement">₹ 0</span>
            </div>
            <div class="result-item" style="margin-top:10px; border-top: 2px solid #cbd5e1; padding-top:10px;">
                <span class="label" style="font-weight:bold;">Total Cost (Int + Fee)</span>
                <span id="res_total_cost" style="font-weight:bold;">₹ 0</span>
            </div>
        </div>
    </div>
</div>

<script>
    const inputs = [
        ['amount', 'sld_amount', 'val_amount'],
        ['interest', 'sld_interest', 'val_interest'],
        ['tenure', 'sld_tenure', 'val_tenure'],
        ['pf_pct', 'sld_pf_pct', 'val_pf_pct']
    ];

    function calculate() {
        const P = parseFloat(document.getElementById('val_amount').value);
        const annualRate = parseFloat(document.getElementById('val_interest').value);
        const years = parseFloat(document.getElementById('val_tenure').value);
        const pfPct = parseFloat(document.getElementById('val_pf_pct').value);

        const r = annualRate / 12 / 100; // Monthly rate
        const n = years * 12; // Total months

        // EMI Calculation (Excel PMT Logic)
        let emi = 0;
        if (r > 0) {
            emi = P * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1);
        } else {
            emi = P / n;
        }

        const pfAmt = (P * pfPct) / 100;
        const totalPayment = emi * n;
        const totalInterest = totalPayment - P;
        const totalCost = totalInterest + pfAmt;
        const disbursement = P - pfAmt;

        // UI Updates
        document.getElementById('res_emi').innerText = '₹' + Math.round(emi).toLocaleString();
        document.getElementById('res_monthly_rate').innerText = (annualRate / 12).toFixed(2) + '%';
        document.getElementById('res_total_months').innerText = n;
        document.getElementById('res_pf_amt').innerText = '₹' + Math.round(pfAmt).toLocaleString();
        document.getElementById('res_disbursement').innerText = '₹' + Math.round(disbursement).toLocaleString();
        document.getElementById('res_total_cost').innerText = '₹' + Math.round(totalCost).toLocaleString();
    }

    // Link Sliders and Text Boxes
    inputs.forEach(([name, sldId, valId]) => {
        const sld = document.getElementById(sldId);
        const val = document.getElementById(valId);

        sld.addEventListener('input', () => { val.value = sld.value; calculate(); });
        val.addEventListener('input', () => { sld.value = val.value; calculate(); });
    });

    // Initial Calculation
    calculate();
</script>

</body>
</html>
